
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIM+ AI Assistant — Streets of Growth</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sog-purple:   #625D9C;
      --sog-blue:     #4197CB;
      --sog-sky:      #5EB3E4;
      --sog-teal:     #0095A9;
      --sog-green:    #00AF9A;
      --sog-charcoal: #323E48;
      --sog-red:      #F32735;
      --sog-orange:   #FF6C0E;
      --sog-yellow:   #F2CD00;
      --sog-off-white:#F5F5F7;
      --purple-10:#F0EFF6; --purple-20:#E0DFEB; --purple-40:#C0BED7; --purple-70:#918DB9;
      --blue-10:#ECF5FA;   --blue-20:#D9EAF5;   --blue-40:#B3D5EA;   --blue-70:#7AB7DB;
      --teal-10:#E6F5F7;   --teal-20:#CCEAEE;   --teal-40:#99D5DD;   --teal-70:#4DB5C3;
      --green-10:#E6F7F5;  --green-20:#CCEFEB;  --green-40:#99DFD7;  --green-70:#4DC7B9;
      --charcoal-10:#EBECED; --charcoal-20:#D6D8DA; --charcoal-40:#ADB2B6; --charcoal-70:#70787F;
      --gradient-signature: linear-gradient(135deg, #625D9C 0%, #0095A9 100%);
      --gradient-authority: linear-gradient(135deg, #323E48 0%, #625D9C 100%);
      --radius-sm:4px; --radius-md:8px; --radius-lg:12px; --radius-xl:16px;
      --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-6:24px;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background: var(--sog-off-white);
      color: var(--sog-charcoal);
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Skip nav ── */
    #skip-link {
      position: absolute;
      top: -100%; left: var(--space-4);
      background: var(--sog-purple); color: #fff;
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      font-weight: 600; font-size: 12px;
      text-decoration: none; z-index: 999;
    }
    #skip-link:focus { top: var(--space-4); }

    /* ── Focus ring ── */
    *:focus-visible { outline: 2px solid var(--sog-purple); outline-offset: 2px; }

    /* ── Topbar — exact pattern from dashboard ── */
    .topbar {
      background: #fff;
      padding: 11px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #E2E4E6;
      flex-shrink: 0;
    }
    .topbar-logo { flex-shrink: 0; }
    .topbar-logo img { width: auto; display: block; }
    .topbar-logo .logo-full  { height: 28px; display: block; }
    .topbar-logo .logo-mark  { height: 32px; display: none; }
    .topbar-divider { width: 1px; height: 24px; background: #E2E4E6; flex-shrink: 0; }
    .topbar-title { color: var(--sog-charcoal); }
    .topbar-title h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.2px; color: var(--sog-charcoal); }
    .topbar-title p  { font-size: 11px; color: var(--charcoal-70); margin-top: 1px; font-weight: 400; }

    /* ── Badge system — exact from dashboard ── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: var(--radius-sm);
      font-size: 10px; font-weight: 700; white-space: nowrap;
      line-height: 1.4; border: 1.5px solid transparent;
    }
    .badge-on-hold { color: var(--sog-teal); background: var(--teal-10); border-color: var(--teal-40); }

    /* ── Suggestions bar ── */
    .suggestions {
      background: #fff;
      border-bottom: 1px solid #E2E4E6;
      padding: 8px 24px;
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      align-items: center;
      flex-shrink: 0;
    }
    .chip {
      background: var(--sog-off-white);
      border: 1.5px solid var(--charcoal-20);
      color: var(--sog-charcoal);
      font-size: 12px; font-weight: 600;
      padding: 4px 12px;
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Open Sans', sans-serif;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .chip:hover { background: var(--sog-purple); color: #fff; border-color: var(--sog-purple); }

    /* ── Reset button — matches dashboard .zbtn style ── */
    .reset-btn {
      margin-left: auto;
      padding: 4px 12px;
      border: 1.5px solid var(--charcoal-20);
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--sog-charcoal);
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      font-family: 'Open Sans', sans-serif;
      transition: all 0.12s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .reset-btn:hover { border-color: var(--sog-purple); color: var(--sog-purple); }
    .reset-btn .material-icons-outlined { font-size: 15px; }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message { display: flex; gap: 10px; max-width: 780px; width: 100%; }
    .message.user    { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0; margin-top: 2px;
      color: #fff;
    }
    .user .avatar      { background: var(--gradient-signature); }
    .assistant .avatar { background: var(--gradient-authority); }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      line-height: 1.6;
      max-width: calc(100% - 42px);
    }
    .user .bubble {
      background: var(--sog-purple);
      color: #fff;
      border-bottom-right-radius: var(--radius-sm);
    }
    .assistant .bubble {
      background: #fff;
      border: 1px solid #E2E4E6;
      border-bottom-left-radius: var(--radius-sm);
      color: var(--sog-charcoal);
    }
    .bubble strong { font-weight: 700; }
    .bubble ul { padding-left: 18px; margin: 6px 0; }
    .bubble li { margin: 3px 0; }

    /* ── Tool indicator ── */
    .tool-indicator {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      background: var(--teal-10);
      border: 1.5px solid var(--teal-40);
      font-size: 10px; font-weight: 700;
      color: var(--sog-teal);
      margin-bottom: 8px;
    }
    .tool-dot { width: 6px; height: 6px; background: var(--sog-teal); border-radius: 50%; }

    /* ── Thinking indicator — NO italic ── */
    .thinking .bubble {
      display: flex; align-items: center; gap: 8px;
      color: var(--charcoal-40);
      font-style: normal;
      font-size: 13px;
    }
    .dots span {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--charcoal-40);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-5px); }
    }
    @media (prefers-reduced-motion: reduce) { .dots span { animation: none; } }

    /* ── Empty state ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px; gap: 12px;
    }
    .empty-icon {
      width: 52px; height: 52px;
      background: var(--gradient-authority);
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      color: #fff; margin-bottom: 4px;
    }
    .empty-icon .material-icons-outlined { font-size: 26px; }
    .empty-state h2 { font-size: 17px; font-weight: 700; }
    .empty-state p  { font-size: 13px; color: var(--charcoal-70); max-width: 320px; }

    /* ── Input bar ── */
    .input-bar {
      background: #fff;
      border-top: 1px solid #E2E4E6;
      padding: 12px 24px;
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }
    .input-bar textarea {
      flex: 1;
      border: 1.5px solid var(--charcoal-20);
      border-radius: var(--radius-lg);
      padding: 9px 14px;
      font-size: 14px; font-family: 'Open Sans', sans-serif;
      color: var(--sog-charcoal);
      resize: none; outline: none;
      min-height: 42px; max-height: 120px;
      line-height: 1.5; transition: border-color 0.12s;
    }
    .input-bar textarea:focus { border-color: var(--sog-purple); }
    .input-bar textarea::placeholder { color: var(--charcoal-40); }

    .send-btn {
      width: 42px; height: 42px;
      background: var(--sog-purple);
      border: none; border-radius: var(--radius-lg);
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .send-btn:hover { background: #534e8a; }
    .send-btn:disabled { opacity: 0.4; cursor: default; }
    .send-btn .material-icons-outlined { font-size: 19px; color: #fff; }

    .input-footer {
      text-align: center; font-size: 11px; color: var(--charcoal-40);
      padding: 3px 0 8px; flex-shrink: 0;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .topbar-logo .logo-full  { display: none; }
      .topbar-logo .logo-mark  { display: block; }
      .topbar-title   { display: none; }
      .topbar-divider { display: none; }
      .topbar  { padding: 10px 16px; }
      .messages { padding: 16px; }
      .input-bar { padding: 10px 16px; }
      .suggestions { padding: 8px 16px; }
      .message { max-width: 100%; }
    }
  </style>
</head>

  <div class="topbar-title">
    <h1>AIM+ AI Assistant</h1>
    <p>Streets of Growth · Live programme data</p>
  </div>
  <span class="badge badge-on-hold" style="margin-left:auto;">Demo</span>
</header>

<div class="suggestions">
  <button class="chip" onclick="sendSuggestion(this)">How many active YP in 2024/25?</button>
  <button class="chip" onclick="sendSuggestion(this)">Referral summary for 2025/26</button>
  <button class="chip" onclick="sendSuggestion(this)">Stage funnel for 2024/25</button>
  <button class="chip" onclick="sendSuggestion(this)">Top interventions this year</button>
  <button class="chip" onclick="sendSuggestion(this)">Demographics breakdown</button>
  <button class="reset-btn" onclick="resetChat()" aria-label="Reset conversation">
    <span class="material-icons-outlined">restart_alt</span> Reset
  </button>

<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">
      <span class="material-icons-outlined">psychology</span>
    </div>
    <h2>Ask about AIM+ programme data</h2>
    <p>Ask questions in plain English — I'll query the live database and answer instantly.</p>
  </div>
</div>

<div class="input-bar">
  <textarea
    id="input"
    placeholder="Ask a question about the programme…"
    rows="1"
    onkeydown="handleKey(event)"
    oninput="autoResize(this)"
  ></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send message">
    <span class="material-icons-outlined">send</span>
  </button>
</div>
<div class="input-footer">Demo only · Live AIM+ data · Streets of Growth</div>

<script>
  const EDGE_FUNCTION_URL = "https://febshlxboadaeafqafsr.supabase.co/functions/v1/ai-chat";
  const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlYnNobHhib2FkYWVhZnFhZnNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDk4MDUsImV4cCI6MjA5MjE4NTgwNX0.gLNUvDPa3Tp9D7R9ypZ6dbW41E-iFMglzBr8NQzyjFU";

  let history = [];
  let isLoading = false;

  function renderMarkdown(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
      .replace(/\n/g, '<br>');
  }

  function addMessage(role, content, toolsUsed = []) {
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();

    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'You' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'assistant' && toolsUsed.length > 0) {
      const indicator = document.createElement('div');
      indicator.className = 'tool-indicator';
      indicator.innerHTML = `<div class="tool-dot"></div> Queried: ${toolsUsed.join(', ').replace(/_/g, ' ')}`;
      bubble.appendChild(indicator);
    }

    const text = document.createElement('div');
    text.innerHTML = renderMarkdown(content);
    bubble.appendChild(text);

    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function addThinking() {
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant thinking';
    div.id = 'thinking';
    div.innerHTML = `
      <div class="avatar">AI</div>
      <div class="bubble">
        Thinking
        <div class="dots"><span></span><span></span><span></span></div>
      </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeThinking() {
    const t = document.getElementById('thinking');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const message = input.value.trim();
    if (!message || isLoading) return;

    isLoading = true;
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    addMessage('user', message);
    addThinking();

    try {
      const response = await fetch(EDGE_FUNCTION_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': ANON_KEY,
          'Authorization': `Bearer ${ANON_KEY}`,
        },
        body: JSON.stringify({ message, history }),
      });
      const data = await response.json();
      removeThinking();
      if (data.error) {
        addMessage('assistant', `Sorry, something went wrong: ${data.error}`);
      } else {
        addMessage('assistant', data.reply, data.tools_used || []);
        history = data.history || [];
      }
    } catch (err) {
      removeThinking();
      addMessage('assistant', `Connection error: ${err.message}`);
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  function sendSuggestion(btn) {
    document.getElementById('input').value = btn.textContent.trim();
    sendMessage();
  }

  function resetChat() {
    history = [];
    document.getElementById('messages').innerHTML = `
      <div class="empty-state" id="emptyState">
        <div class="empty-icon"><span class="material-icons-outlined">psychology</span></div>
        <h2>Ask about AIM+ programme data</h2>
        <p>Ask questions in plain English — I'll query the live database and answer instantly.</p>
      </div>`;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
</script>
