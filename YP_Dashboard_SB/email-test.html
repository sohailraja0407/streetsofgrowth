<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoG Data Foundation — Azure Auth Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 6px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
    }

    /* Microsoft button — official brand colours */
    .ms-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px 16px;
      background: #fff;
      color: #5e5e5e;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .ms-btn:hover {
      background: #f3f4f6;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .ms-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .ms-logo {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .ms-logo span {
      display: block;
      width: 10px;
      height: 10px;
    }

    .alert {
      display: none;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 20px;
      line-height: 1.5;
    }

    .alert.success { display: block; background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
    .alert.error   { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
    .alert.info    { display: block; background: #eff6ff; color: #1e40af; border: 1px solid #93c5fd; }

    /* Logged-in state */
    .user-panel {
      display: none;
    }

    .user-panel.visible {
      display: block;
    }

    .user-info {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .user-info p {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .user-info strong {
      font-size: 15px;
      color: #111827;
      display: block;
      word-break: break-all;
    }

    .user-info .provider-badge {
      display: inline-block;
      margin-top: 8px;
      background: #0078d4;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
      letter-spacing: 0.04em;
    }

    .signout-btn {
      width: 100%;
      padding: 11px;
      background: #fff;
      color: #374151;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .signout-btn:hover { border-color: #ef4444; color: #ef4444; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 24px 0;
      color: #9ca3af;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">SoG Data Foundation</div>
  <h1>Azure Auth Test</h1>
  <p class="subtitle">Sign in with your Microsoft / Azure AD account</p>

  <!-- Sign-in panel -->
  <div id="signin-panel">
    <button class="ms-btn" id="ms-signin-btn" onclick="signInWithAzure()">
      <div class="ms-logo">
        <span style="background:#f25022;"></span><span style="background:#7fba00;"></span>
        <span style="background:#00a4ef;"></span><span style="background:#ffb900;"></span>
      </div>
      Sign in with Microsoft
    </button>
  </div>

  <!-- Logged-in panel -->
  <div class="user-panel" id="user-panel">
    <div class="user-info">
      <p>Signed in as</p>
      <strong id="user-email"></strong>
      <span class="provider-badge">Azure AD</span>
    </div>
    <button class="signout-btn" onclick="signOut()">Sign out</button>
  </div>

  <div id="alert" class="alert"></div>

  <p class="footer">
    Project: SoG Data Foundation &nbsp;·&nbsp; Region: eu-north-1
  </p>
</div>

<script>
  const { createClient } = supabase;

  const client = createClient(
    'https://vsjyvqrjjnpyidovgdnz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzanl2cXJqam5weWlkb3ZnZG56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTc4MjQsImV4cCI6MjA5MjE5MzgyNH0.4v98dXyFh0OYzzssbk_ew9rU2VVsYJiNXRiIeHL8rzw'
  );

  function showAlert(type, msg) {
    const el = document.getElementById('alert');
    el.className = 'alert ' + type;
    el.textContent = msg;
  }

  function setUser(user) {
    if (user) {
      document.getElementById('signin-panel').style.display = 'none';
      document.getElementById('user-panel').classList.add('visible');
      document.getElementById('user-email').textContent = user.email || user.id;
    } else {
      document.getElementById('signin-panel').style.display = 'block';
      document.getElementById('user-panel').classList.remove('visible');
    }
  }

  async function signInWithAzure() {
    const btn = document.getElementById('ms-signin-btn');
    btn.disabled = true;
    btn.textContent = 'Redirecting to Microsoft...';
    showAlert('info', 'Opening Microsoft sign-in...');

    const { error } = await client.auth.signInWithOAuth({
      provider: 'azure',
      options: {
        redirectTo: window.location.href,
        scopes: 'email profile openid'
      }
    });

    if (error) {
      showAlert('error', 'Error: ' + error.message);
      btn.disabled = false;
      btn.innerHTML = `
        <div class="ms-logo">
          <span style="background:#f25022;"></span><span style="background:#7fba00;"></span>
          <span style="background:#00a4ef;"></span><span style="background:#ffb900;"></span>
        </div>
        Sign in with Microsoft`;
    }
  }

  async function signOut() {
    await client.auth.signOut();
    setUser(null);
    showAlert('info', 'Signed out.');
  }

  // Check session on load (handles OAuth redirect callback)
  client.auth.getSession().then(({ data: { session } }) => {
    if (session?.user) {
      setUser(session.user);
      showAlert('success', 'Successfully authenticated via Azure AD.');
    }
  });

  // Listen for auth state changes
  client.auth.onAuthStateChange((_event, session) => {
    setUser(session?.user ?? null);
  });
</script>

</body>
</html>
